<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Northbase | Email Confirmed</title>
    <meta
      name="description"
      content="Email confirmed for Northbase."
    />
    <meta name="theme-color" content="#111214" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111214;
        --bg-elevated: #17191d;
        --line: #2a2f38;
        --line-strong: #3a414d;
        --text: #f3f0e8;
        --muted: #b9b4a8;
        --muted-strong: #d2cbbc;
        --accent: #c7f36b;
        --radius: 24px;
        --shadow: 0 24px 48px rgba(0, 0, 0, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua",
          Georgia, serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .skip-link {
        position: absolute;
        left: 1rem;
        top: -3rem;
        z-index: 100;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        background: #ffffff;
        color: #000000;
        text-decoration: none;
        transition: top 0.18s ease;
      }

      .skip-link:focus-visible {
        top: 1rem;
      }

      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding:
          max(1.5rem, env(safe-area-inset-top))
          max(1rem, env(safe-area-inset-right))
          max(1.5rem, env(safe-area-inset-bottom))
          max(1rem, env(safe-area-inset-left));
      }

      .confirmation-card {
        width: min(100%, 38rem);
        padding: 2rem;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--bg-elevated);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .eyebrow {
        color: var(--muted);
        font-family: "SF Mono", "Monaco", "Inconsolata", "Roboto Mono",
          "Source Code Pro", monospace;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1rem 0 0;
        font-size: clamp(2.5rem, 8vw, 4.25rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
        text-wrap: balance;
      }

      .subtext {
        margin: 1rem 0 0;
        color: var(--muted-strong);
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 1.75;
      }

      .note {
        margin: 1rem 0 0;
        color: var(--muted);
        font-size: 0.96rem;
        line-height: 1.7;
      }

      @media (max-width: 720px) {
        .confirmation-card {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to Main Content</a>
    <main id="main">
      <section class="confirmation-card" aria-labelledby="confirmed-title">
        <div class="eyebrow">Northbase</div>
        <h1 id="confirmed-title">✅ Email confirmed</h1>
        <p class="subtext">You can now log in on the Northbase app.</p>
        <p class="note">
          If the app didn’t open automatically, return to the app and sign in.
        </p>
      </section>
    </main>
  </body>
</html>
